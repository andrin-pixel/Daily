<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Archiv – Wochenbriefing</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f1a;
    color: #e8e8f0;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
  }
  a { color: #5b8def; text-decoration: none; }
  h1 { font-size: 1.3rem; }
  ul { list-style: none; padding: 0; }
  li {
    background: #1a1a2e;
    border: 1px solid #2a2a42;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .back { display: inline-block; margin-bottom: 16px; }
</style>
</head>
<body>
  <a class="back" href="index.html">← Zurück zum aktuellen Briefing</a>
  <h1>Archiv</h1>
  <p style="color:#9494a8; font-size:0.85rem;">
    Hinweis: Diese Liste musst du einmalig manuell pflegen (Dateinamen
    aus <code>data/archive/</code> eintragen) oder – etwas fortgeschrittener –
    per kleinem Skript automatisch generieren lassen (siehe README).
  </p>
  <ul id="list"></ul>

  <script>
    // Einfachster Ansatz: Dateinamen hier manuell nachtragen, sobald
    // neue Archiv-Dateien entstehen. Für "automatisch" siehe README.
    const archiveFiles = [
      // "2026-07-20-vorschau.json",
      // "2026-07-24-rueckblick.json",
    ];

    const list = document.getElementById('list');
    if (archiveFiles.length === 0) {
      list.innerHTML = '<li>Noch keine Archiv-Einträge eingetragen.</li>';
    } else {
      archiveFiles.reverse().forEach((file) => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="index.html?data=data/archive/${file}">${file}</a>`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
